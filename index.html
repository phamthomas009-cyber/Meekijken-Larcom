<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Meekijken Larcom</title>

    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Catamaran', monospace;
            padding: 20px;
            color: #0b2a4a;
			display: flex;
    		flex-direction: column;
    		align-items: center;   /* horizontaal centreren */
            margin: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
			position: relative;
			justify-content: center;

        }

        input {
        	text-align: center;
    		font-variant-numeric: tabular-nums;
            padding: 10px 12px; 
            font-size: 21px;
            color: #213461;
            border-radius: 10px;
            border: 2px solid #213461;
            outline: none;
            width: 160px;
            height: 50px;
            font-weight: 600;
            font-family: 'Catamaran', monospace;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #e6592b;
        }

        .error {
            margin-left: 20px;
			color: red;
            font-family: 'Catamaran', monospace;
            font-size: 18px;
            font-weight: 200;
            min-width: 210px;
			
			display: flex;
			position: absolute;
			left: 100%; /* errorcode rechts van inputbox */
            gap: 6px; /* ruimte tussen ! en error code */
			align-items: center;
			opacity: 0;         /*  start onzichtbaar */
    		transform: translateY(-5px); /*  klein beetje omhoog */
    		transition: all 0.25s ease; /*animatie */
        }

		.error::before {
   			content: "!";
   			display: inline-flex; /* standaard verbergen */
    		align-items: center;
    		justify-content: center;

    		width: 20px;
    		height: 20px;

    		border: 1px solid #F00; /* rode rand */
    		color: #F00;            /* rood uitroepteken */
    		background-color: white;   /* witte achtergrond */

    		border-radius: 50%;
    		font-size: 14px;
    		font-weight: 200;
            align-items: center;
		}

		.error.show {
    		opacity: 1;
    		transform: translateY(0);  /* zakt netjes op plek */
		}

        button {
        	font-family: 'Catamaran', sans-serif;
            margin-top: 32px;
			margin-left: 6px;
            padding: 7px 34px;
            font-size: 21px;
            border-radius: 25px;
            border: none;
            background-color: #E5DAD6;
            color: #213461;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            
		}
        
		button:hover {
            background-color: #213461;
            color: #e6592b;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="input-row">
    <input type="text" id="nummer" maxlength="11" placeholder="000-000-000">
    <div id="foutmelding" class="error"></div>
</div>

<button id="btn">Verbinden</button>

<script>
const input = document.getElementById("nummer");
const button = document.getElementById("btn");
const foutmelding = document.getElementById("foutmelding");

// Formatter + live validatie
input.addEventListener("input", function (e) {
    let value = e.target.value.replace(/\D/g, "");
    value = value.substring(0, 9);

    let formatted = value;
    if (value.length > 6) {
        formatted = value.slice(0,3) + "-" + value.slice(3,6) + "-" + value.slice(6);
    } else if (value.length > 3) {
        formatted = value.slice(0,3) + "-" + value.slice(3);
    }

    e.target.value = formatted;

    // foutmelding weg bij 9 cijfers
    if (value.length === 9) {
        foutmelding.classList.remove("show");
    }
});

// Klik
button.addEventListener("click", function () {
    let nummer = input.value.replace(/-/g, "");

    if (!/^\d{9}$/.test(nummer)) {
        foutmelding.textContent = "Voer precies 9 cijfers in.";
		foutmelding.classList.add("show"); //zichtbaar maken
        return;
    }

    foutmelding.classList.add("show");

    const url = "https://helpdesk.me/end-user-support/" + nummer;
    window.open(url, '_blank');
});
</script>

</body>
</html>
